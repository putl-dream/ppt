name: Package desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: win
            artifact_name: agent-ppt-win

          - name: macOS
            os: macos-latest
            target: mac
            artifact_name: agent-ppt-mac

          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact_name: agent-ppt-linux

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Verify icon assets
        shell: bash
        run: |
          test -f build/icon.ico
          test -f build/icon.png
          test -f build/icon.icns

      - name: Build app
        run: npm run build

      - name: Package app
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.AppImage
            dist/*.AppImage.zsync
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.zip
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: package
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            {
              echo "tag=${GITHUB_REF_NAME}"
              echo "title=${GITHUB_REF_NAME}"
              echo "prerelease=false"
              echo "rolling=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=latest"
              echo "title=Latest Build"
              echo "prerelease=true"
              echo "rolling=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check release files
        shell: bash
        run: |
          echo "Release files:"
          find release-artifacts -type f

      - name: Move rolling release tag
        if: steps.release_target.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
        shell: bash
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_target.outputs.title }}
          RELEASE_PRERELEASE: ${{ steps.release_target.outputs.prerelease }}
        shell: bash
        run: |
          mapfile -t files < <(find release-artifacts -type f)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              gh release edit "$RELEASE_TAG" \
                --title "$RELEASE_TITLE" \
                --notes "Rolling build from ${GITHUB_REF_NAME} (${GITHUB_SHA::7})." \
                --prerelease
            fi
          elif [ "$RELEASE_PRERELEASE" = "true" ]; then
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --title "$RELEASE_TITLE" \
              --notes "Rolling build from ${GITHUB_REF_NAME} (${GITHUB_SHA::7})." \
              --prerelease
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --title "$RELEASE_TITLE" --generate-notes
          fi
